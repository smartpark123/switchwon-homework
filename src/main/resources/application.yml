spring:
  datasource:
    url: jdbc:h2:file:./data/forexdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

forex:
  client:
    use-mock: false
  scheduler:
    currencies: USD,JPY,CNY,EUR
